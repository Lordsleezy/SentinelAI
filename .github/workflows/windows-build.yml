name: Build Windows EXE

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed main.py --name SentinelAI

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SentinelAI-Windows-EXE
          path: dist/SentinelAI.exe

      - name: Publish EXE to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sentinelai-windows-latest
          name: SentinelAI Windows Build
          files: dist/SentinelAI.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
