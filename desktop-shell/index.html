<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SentinelAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #00ff88;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .container {
      text-align: center;
      padding: 40px 50px;
      background: rgba(10, 10, 10, 0.85);
      border: 1px solid rgba(0, 255, 136, 0.4);
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.15), 0 0 80px rgba(0, 0, 0, 0.6);
      min-width: 360px;
    }

    h1 {
      font-size: 2.6em;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 8px;
      animation: glow 2s ease-in-out infinite alternate;
    }

    .tagline {
      font-size: 0.75em;
      color: #00ccff;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0.8;
    }

    @keyframes glow {
      from { text-shadow: 0 0 8px rgba(0, 255, 136, 0.5); }
      to   { text-shadow: 0 0 24px rgba(0, 255, 136, 1), 0 0 48px rgba(0, 255, 136, 0.3); }
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(0, 255, 136, 0.2);
      border-top: 3px solid #00ff88;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .status {
      font-size: 0.9em;
      color: #aaa;
      min-height: 1.4em;
      margin-bottom: 18px;
      transition: opacity 0.2s ease;
    }

    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(0, 255, 136, 0.12);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff88, #00ccff);
      border-radius: 2px;
      width: 0%;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .info {
      font-size: 0.78em;
      color: #555;
      line-height: 1.7;
    }

    .version {
      margin-top: 12px;
      font-size: 0.72em;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ SentinelAI</h1>
    <div class="tagline">Orchestration OS</div>
    <div class="spinner"></div>
    <div class="status" id="status">Initializing...</div>
    <div class="progress-track">
      <div class="progress-fill" id="progress"></div>
    </div>
    <div class="info">
      <div>Runtime Intelligence · Autonomous Workflows</div>
      <div>Multi-Agent Coordination · Persistent Memory</div>
    </div>
    <div class="version">v1.0.0</div>
  </div>

  <script>
    // nodeIntegration is enabled for this splash window so we can use IPC
    try {
      const { ipcRenderer } = require('electron');

      ipcRenderer.on('splash-message', (_event, msg) => {
        const el = document.getElementById('status');
        if (el) el.textContent = msg;
      });

      ipcRenderer.on('splash-progress', (_event, pct) => {
        const el = document.getElementById('progress');
        if (el) el.style.width = pct + '%';
      });
    } catch (e) {
      // Fallback if running outside Electron (browser preview)
      console.log('IPC not available:', e.message);
    }
  </script>
</body>
</html>
